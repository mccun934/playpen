<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Voxel Earth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; font-family: system-ui, sans-serif; color: #ddd; }
    #app { position: fixed; inset: 0; }
    #hud {
      position: fixed; top: 10px; left: 12px; padding: 8px 10px;
      background: rgba(0,0,0,0.45); border: 1px solid #333; border-radius: 6px;
      font-size: 12px; line-height: 1.4; pointer-events: none;
    }
    #hud b { color: #6cf; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #000; color: #6cf; font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="hud">
    <b>Voxel Earth</b><br/>
    Drag to rotate &middot; Scroll to zoom
  </div>
  <div id="loading">Loading Earth texture…</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const EARTH_TEXTURE_URL =
      'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg';

    // Resolution of the lat/lon sampling grid. Higher = more cubes = chunkier feel.
    const LAT_STEPS = 128;
    const LON_STEPS = 256;
    const RADIUS = 50;
    const VOXEL_SIZE = (Math.PI * RADIUS) / LAT_STEPS * 1.05;

    const app = document.getElementById('app');
    const loadingEl = document.getElementById('loading');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05060a);

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(0, 40, 160);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 70;
    controls.maxDistance = 600;

    // Lighting: a key sun + soft fill so the night side isn't pitch-black.
    const sun = new THREE.DirectionalLight(0xffffff, 1.2);
    sun.position.set(200, 120, 200);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x404060, 0.6));
    scene.add(new THREE.HemisphereLight(0x99bbff, 0x202020, 0.35));

    // Subtle starfield.
    {
      const starCount = 2000;
      const positions = new Float32Array(starCount * 3);
      for (let i = 0; i < starCount; i++) {
        const r = 1000;
        const u = Math.random(), v = Math.random();
        const theta = 2 * Math.PI * u;
        const phi = Math.acos(2 * v - 1);
        positions[i*3+0] = r * Math.sin(phi) * Math.cos(theta);
        positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i*3+2] = r * Math.cos(phi);
      }
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      const m = new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, sizeAttenuation: false });
      scene.add(new THREE.Points(g, m));
    }

    // Group so we can spin the whole planet.
    const earth = new THREE.Group();
    scene.add(earth);

    // Sample an equirectangular Earth texture into a 2D canvas so we can read pixels.
    function sampleTexture(image) {
      const canvas = document.createElement('canvas');
      canvas.width = image.width;
      canvas.height = image.height;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(image, 0, 0);
      return ctx.getImageData(0, 0, canvas.width, canvas.height);
    }

    function buildVoxelEarth(imgData) {
      const geom = new THREE.BoxGeometry(VOXEL_SIZE, VOXEL_SIZE, VOXEL_SIZE);
      const mat = new THREE.MeshLambertMaterial({ vertexColors: false });

      const total = LAT_STEPS * LON_STEPS;
      const mesh = new THREE.InstancedMesh(geom, mat, total);
      mesh.instanceMatrix.setUsage(THREE.StaticDrawUsage);

      const dummy = new THREE.Object3D();
      const color = new THREE.Color();
      const w = imgData.width, h = imgData.height, data = imgData.data;

      let idx = 0;
      for (let i = 0; i < LAT_STEPS; i++) {
        // latitude from -pi/2..pi/2, offset half-step so we don't pinch the poles
        const lat = -Math.PI / 2 + ((i + 0.5) / LAT_STEPS) * Math.PI;
        const cosLat = Math.cos(lat);
        const sinLat = Math.sin(lat);

        for (let j = 0; j < LON_STEPS; j++) {
          const lon = (j / LON_STEPS) * Math.PI * 2 - Math.PI;
          const cosLon = Math.cos(lon);
          const sinLon = Math.sin(lon);

          const x = RADIUS * cosLat * cosLon;
          const y = RADIUS * sinLat;
          const z = RADIUS * cosLat * sinLon;

          // sample equirectangular texture; u: 0..1 across lon, v: 0..1 from north..south
          const u = (lon + Math.PI) / (2 * Math.PI);
          const v = 1 - (lat + Math.PI / 2) / Math.PI;
          const px = Math.min(w - 1, Math.max(0, Math.floor(u * w)));
          const py = Math.min(h - 1, Math.max(0, Math.floor(v * h)));
          const o = (py * w + px) * 4;
          const r = data[o] / 255, g = data[o+1] / 255, b = data[o+2] / 255;

          color.setRGB(r, g, b);

          // Orient cube so one face points outward (along the surface normal).
          dummy.position.set(x, y, z);
          dummy.lookAt(0, 0, 0);
          dummy.updateMatrix();

          mesh.setMatrixAt(idx, dummy.matrix);
          mesh.setColorAt(idx, color);
          idx++;
        }
      }
      mesh.instanceMatrix.needsUpdate = true;
      if (mesh.instanceColor) mesh.instanceColor.needsUpdate = true;

      earth.add(mesh);

      // Faint translucent sphere just inside the voxels to fill gaps at glancing angles.
      const fill = new THREE.Mesh(
        new THREE.SphereGeometry(RADIUS - VOXEL_SIZE * 0.4, 64, 48),
        new THREE.MeshBasicMaterial({ color: 0x081428 })
      );
      earth.add(fill);
    }

    const loader = new THREE.ImageLoader();
    loader.setCrossOrigin('anonymous');
    loader.load(
      EARTH_TEXTURE_URL,
      (image) => {
        const data = sampleTexture(image);
        buildVoxelEarth(data);
        loadingEl.remove();
      },
      undefined,
      (err) => {
        loadingEl.textContent = 'Failed to load Earth texture (check network / CORS).';
        console.error(err);
      }
    );

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      earth.rotation.y += 0.0008;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
