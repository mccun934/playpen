<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Voxel Earth</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    html, body { margin: 0; height: 100%; background: #000; overflow: hidden; font-family: system-ui, sans-serif; color: #ddd; }
    #app { position: fixed; inset: 0; }
    #panel {
      position: fixed; top: 12px; left: 12px; width: 280px;
      padding: 12px 14px; background: rgba(0,0,0,0.55);
      border: 1px solid #333; border-radius: 8px; font-size: 12px; line-height: 1.5;
      backdrop-filter: blur(6px);
    }
    #panel h1 { margin: 0 0 6px; font-size: 13px; color: #6cf; letter-spacing: 0.5px; }
    #panel .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-top: 8px; }
    #panel .row label { flex: 0 0 auto; color: #aaa; }
    #panel .row input[type="range"] { flex: 1; }
    #panel .row select, #panel .row input[type="text"], #panel .row input[type="file"] {
      flex: 1; background: #111; color: #ddd; border: 1px solid #333; border-radius: 4px; padding: 3px 6px; font: inherit;
    }
    #panel button {
      background: #145; color: #cef; border: 1px solid #277; border-radius: 4px;
      padding: 4px 10px; font: inherit; cursor: pointer;
    }
    #panel button:hover { background: #277; }
    #panel .hint { color: #777; font-size: 11px; margin-top: 6px; }
    #status { color: #6cf; min-height: 1.2em; margin-top: 6px; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      background: #000; color: #6cf; font-size: 14px; pointer-events: none;
    }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="app"></div>

  <div id="panel">
    <h1>VOXEL EARTH</h1>
    <div class="row"><label>Map image</label><input id="file" type="file" accept="image/*" /></div>
    <div class="row"><label>or URL</label><input id="url" type="text" placeholder="https://…/equirect.jpg" /></div>
    <div class="row"><button id="applyUrl">Apply URL</button><span class="hint">(needs CORS)</span></div>
    <div class="row"><label>Resolution</label>
      <select id="res">
        <option value="64,128">Low (64×128)</option>
        <option value="96,192">Med (96×192)</option>
        <option value="128,256" selected>High (128×256)</option>
        <option value="192,384">Very high (192×384)</option>
        <option value="256,512">Ultra (256×512)</option>
      </select>
    </div>
    <div class="row"><label>Land pop</label><input id="pop" type="range" min="0" max="3" step="0.05" value="1.2" /><span id="popVal">1.2</span></div>
    <div class="row"><label>Rotation</label><input id="spin" type="range" min="0" max="3" step="0.05" value="1.0" /></div>
    <div id="status"></div>
    <div class="hint">Drag to rotate · scroll to zoom</div>
  </div>

  <div id="loading">Loading Earth…</div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // ---------- constants ----------
    const DEFAULT_EARTH_URL = 'https://threejs.org/examples/textures/planets/earth_atmos_2048.jpg';
    const RADIUS = 50;

    // Biome palette. Order is the atlas column order; each biome has 4 variants.
    const BIOMES = [
      { name: 'deep_ocean',    base: [ 10,  28,  65], speckle: [  6,  18,  48], dotChance: 0.06 },
      { name: 'shallow_water', base: [ 38,  96, 158], speckle: [ 80, 150, 200], dotChance: 0.10 },
      { name: 'ice',           base: [220, 232, 240], speckle: [180, 200, 220], dotChance: 0.08 },
      { name: 'snow',          base: [240, 244, 248], speckle: [210, 215, 222], dotChance: 0.05 },
      { name: 'tundra',        base: [120, 116,  98], speckle: [ 90,  86,  72], dotChance: 0.18 },
      { name: 'mountain',      base: [115, 110, 102], speckle: [ 70,  68,  64], dotChance: 0.22 },
      { name: 'forest',        base: [ 42,  92,  48], speckle: [ 24,  62,  30], dotChance: 0.22 },
      { name: 'grass',         base: [ 96, 152,  78], speckle: [ 64, 118,  56], dotChance: 0.15 },
      { name: 'desert',        base: [218, 190, 120], speckle: [196, 162,  92], dotChance: 0.18 },
      { name: 'jungle',        base: [ 26,  88,  40], speckle: [ 12,  56,  26], dotChance: 0.28 },
    ];
    const TILE_PX = 16;
    const VARIANTS = 4;
    const ATLAS_W = BIOMES.length * TILE_PX;
    const ATLAS_H = VARIANTS * TILE_PX;

    // ---------- scene ----------
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x05060a);

    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.1, 2000);
    camera.position.set(0, 40, 170);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    document.getElementById('app').appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true; controls.dampingFactor = 0.08;
    controls.minDistance = 70; controls.maxDistance = 600;

    const sun = new THREE.DirectionalLight(0xffffff, 1.15);
    sun.position.set(200, 120, 200);
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0x506080, 0.55));
    scene.add(new THREE.HemisphereLight(0x99bbff, 0x202028, 0.3));

    // Starfield
    {
      const N = 2000, pos = new Float32Array(N*3);
      for (let i=0;i<N;i++) {
        const r = 1000, u = Math.random(), v = Math.random();
        const t = 2*Math.PI*u, p = Math.acos(2*v-1);
        pos[i*3] = r*Math.sin(p)*Math.cos(t);
        pos[i*3+1] = r*Math.sin(p)*Math.sin(t);
        pos[i*3+2] = r*Math.cos(p);
      }
      const g = new THREE.BufferGeometry();
      g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
      scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, sizeAttenuation: false })));
    }

    const earth = new THREE.Group();
    scene.add(earth);

    // ---------- atlas ----------
    // Tiny seeded RNG so variants are stable.
    function mulberry32(a) { return function() { a |= 0; a = a + 0x6D2B79F5 | 0; let t = a; t = Math.imul(t ^ t >>> 15, t | 1); t ^= t + Math.imul(t ^ t >>> 7, t | 61); return ((t ^ t >>> 14) >>> 0) / 4294967296; }; }

    function drawTile(ctx, ox, oy, biome, variantIdx) {
      const rng = mulberry32((BIOMES.indexOf(biome)+1) * 1009 + variantIdx * 7919);
      const [br, bg, bb] = biome.base;
      // Base fill with subtle per-variant tint shift.
      const tintShift = (variantIdx - 1.5) * 6;
      ctx.fillStyle = `rgb(${br+tintShift},${bg+tintShift},${bb+tintShift})`;
      ctx.fillRect(ox, oy, TILE_PX, TILE_PX);
      // Speckles
      const [sr, sg, sb] = biome.speckle;
      for (let y = 0; y < TILE_PX; y++) {
        for (let x = 0; x < TILE_PX; x++) {
          if (rng() < biome.dotChance) {
            const jitter = (rng() - 0.5) * 30;
            ctx.fillStyle = `rgb(${sr+jitter},${sg+jitter},${sb+jitter})`;
            ctx.fillRect(ox + x, oy + y, 1, 1);
          }
        }
      }
      // Extra structure for a few biomes
      if (biome.name === 'mountain') {
        ctx.fillStyle = `rgb(150,148,142)`;
        for (let i = 0; i < 3; i++) {
          const x = Math.floor(rng() * (TILE_PX-3));
          const y = Math.floor(rng() * (TILE_PX-3));
          ctx.fillRect(ox+x, oy+y, 2, 1);
          ctx.fillRect(ox+x, oy+y+1, 1, 1);
        }
      } else if (biome.name === 'forest' || biome.name === 'jungle') {
        ctx.fillStyle = biome.name === 'jungle' ? 'rgb(60,140,72)' : 'rgb(70,128,60)';
        for (let i = 0; i < 4; i++) {
          const x = Math.floor(rng() * (TILE_PX-2));
          const y = Math.floor(rng() * (TILE_PX-2));
          ctx.fillRect(ox+x, oy+y, 2, 2);
        }
      } else if (biome.name === 'desert') {
        ctx.fillStyle = 'rgb(232,210,150)';
        for (let i = 0; i < 5; i++) {
          const x = Math.floor(rng() * (TILE_PX-1));
          const y = Math.floor(rng() * (TILE_PX-1));
          ctx.fillRect(ox+x, oy+y, 1, 1);
        }
      } else if (biome.name === 'ice') {
        ctx.strokeStyle = 'rgb(170,200,225)'; ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(ox + rng()*TILE_PX, oy);
        ctx.lineTo(ox + rng()*TILE_PX, oy + TILE_PX);
        ctx.stroke();
      } else if (biome.name === 'shallow_water' || biome.name === 'deep_ocean') {
        ctx.fillStyle = biome.name === 'deep_ocean' ? 'rgb(20,42,90)' : 'rgb(120,180,220)';
        for (let i = 0; i < 2; i++) {
          const x = Math.floor(rng() * (TILE_PX-4));
          const y = Math.floor(rng() * TILE_PX);
          ctx.fillRect(ox+x, oy+y, 3, 1);
        }
      }
    }

    function buildAtlasTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = ATLAS_W; canvas.height = ATLAS_H;
      const ctx = canvas.getContext('2d');
      ctx.imageSmoothingEnabled = false;
      for (let b = 0; b < BIOMES.length; b++) {
        for (let v = 0; v < VARIANTS; v++) {
          drawTile(ctx, b * TILE_PX, v * TILE_PX, BIOMES[b], v);
        }
      }
      const tex = new THREE.CanvasTexture(canvas);
      tex.magFilter = THREE.NearestFilter;
      tex.minFilter = THREE.NearestFilter;
      tex.colorSpace = THREE.SRGBColorSpace;
      return tex;
    }

    const atlasTexture = buildAtlasTexture();

    // ---------- biome classifier ----------
    function classifyBiome(r, g, b, lat) {
      // r,g,b are 0..1; lat is -PI/2..PI/2
      const lum = 0.299*r + 0.587*g + 0.114*b;
      const absLat = Math.abs(lat);
      const isBluish = (b > r * 1.05) && (b > g * 0.92);

      // Water
      if (isBluish && lum < 0.55) {
        return lum < 0.30 ? 0 /* deep */ : 1 /* shallow */;
      }
      // Polar caps — only over land or very bright water
      if (absLat > 1.30 /* ~75deg */ && lum > 0.55) return 3; // snow
      if (absLat > 1.40) return 2; // ice (over water near poles)

      // Sub-polar tundra
      if (absLat > 1.05 /* ~60deg */) {
        if (lum > 0.75) return 3; // snow patches
        return 4; // tundra
      }

      // Land by color
      const greenDom = g > r * 1.02 && g > b * 1.05;
      const yellowish = r > 0.55 && g > 0.45 && b < 0.45 && r > b;
      const grayish = Math.abs(r-g) < 0.08 && Math.abs(g-b) < 0.08 && lum < 0.6;

      if (grayish && lum < 0.45) return 5; // mountain
      if (yellowish) return 8; // desert
      if (greenDom) {
        if (absLat < 0.45 /* ~25deg, tropics */ && g > 0.35) return 9; // jungle
        if (lum < 0.40) return 6; // forest
        return 7; // grass
      }
      // Fallback for muddy/brown land
      if (lum < 0.35) return 6; // forest
      return 7; // grass
    }

    function isWater(biome) { return biome === 0 || biome === 1; }

    // ---------- image sampling ----------
    let sourceImageData = null;

    function imageToData(image) {
      const c = document.createElement('canvas');
      c.width = image.width; c.height = image.height;
      const ctx = c.getContext('2d', { willReadFrequently: true });
      ctx.drawImage(image, 0, 0);
      return ctx.getImageData(0, 0, c.width, c.height);
    }

    function loadFromURL(url) {
      setStatus('Loading image…');
      return new Promise((resolve, reject) => {
        const loader = new THREE.ImageLoader();
        loader.setCrossOrigin('anonymous');
        loader.load(url, img => resolve(imageToData(img)),
          undefined,
          err => reject(err));
      });
    }

    function loadFromFile(file) {
      setStatus('Loading image…');
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => {
          const img = new Image();
          img.onload = () => resolve(imageToData(img));
          img.onerror = reject;
          img.src = e.target.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ---------- voxel builder ----------
    let currentMesh = null;
    let currentFill = null;

    function buildVoxelEarth(imgData, latSteps, lonSteps, popHeight) {
      // Tear down previous
      if (currentMesh) { earth.remove(currentMesh); currentMesh.geometry.dispose(); currentMesh.material.dispose(); currentMesh = null; }
      if (currentFill) { earth.remove(currentFill); currentFill.geometry.dispose(); currentFill.material.dispose(); currentFill = null; }

      const voxelSize = (Math.PI * RADIUS) / latSteps * 1.05;
      const total = latSteps * lonSteps;

      const geom = new THREE.BoxGeometry(voxelSize, voxelSize, voxelSize);
      const uvOffset = new THREE.InstancedBufferAttribute(new Float32Array(total * 2), 2);
      const uvScale  = new THREE.InstancedBufferAttribute(new Float32Array(total * 2), 2);
      geom.setAttribute('uvOffset', uvOffset);
      geom.setAttribute('uvScale',  uvScale);

      const mat = new THREE.MeshLambertMaterial({ map: atlasTexture });
      mat.onBeforeCompile = (shader) => {
        shader.vertexShader = shader.vertexShader
          .replace('#include <common>',
            `#include <common>
             attribute vec2 uvOffset;
             attribute vec2 uvScale;
             varying vec2 vAtlasOffset;
             varying vec2 vAtlasScale;`)
          .replace('#include <uv_vertex>',
            `#include <uv_vertex>
             vAtlasOffset = uvOffset;
             vAtlasScale = uvScale;`);
        shader.fragmentShader = shader.fragmentShader
          .replace('#include <common>',
            `#include <common>
             varying vec2 vAtlasOffset;
             varying vec2 vAtlasScale;`)
          .replace('#include <map_fragment>',
            `#ifdef USE_MAP
               vec2 atlasUv = fract(vMapUv) * vAtlasScale + vAtlasOffset;
               vec4 sampledDiffuseColor = texture2D(map, atlasUv);
               diffuseColor *= sampledDiffuseColor;
             #endif`);
      };

      const mesh = new THREE.InstancedMesh(geom, mat, total);
      mesh.instanceMatrix.setUsage(THREE.StaticDrawUsage);

      const dummy = new THREE.Object3D();
      const w = imgData.width, h = imgData.height, data = imgData.data;
      // Stable RNG for picking tile variants per voxel.
      const rng = mulberry32(0xCAFEF00D);

      const tileUSpan = 1 / BIOMES.length;
      const tileVSpan = 1 / VARIANTS;

      let idx = 0;
      for (let i = 0; i < latSteps; i++) {
        const lat = -Math.PI / 2 + ((i + 0.5) / latSteps) * Math.PI;
        const cosLat = Math.cos(lat), sinLat = Math.sin(lat);

        for (let j = 0; j < lonSteps; j++) {
          const lon = (j / lonSteps) * Math.PI * 2 - Math.PI;
          const cosLon = Math.cos(lon), sinLon = Math.sin(lon);

          const u = (lon + Math.PI) / (2 * Math.PI);
          const v = 1 - (lat + Math.PI / 2) / Math.PI;
          const px = Math.min(w - 1, Math.max(0, Math.floor(u * w)));
          const py = Math.min(h - 1, Math.max(0, Math.floor(v * h)));
          const o = (py * w + px) * 4;
          const r = data[o] / 255, g = data[o+1] / 255, b = data[o+2] / 255;

          const biome = classifyBiome(r, g, b, lat);
          const variant = Math.floor(rng() * VARIANTS);

          // Land pops outward; water stays at the surface.
          const radial = isWater(biome) ? RADIUS : RADIUS + popHeight;
          const x = radial * cosLat * cosLon;
          const y = radial * sinLat;
          const z = radial * cosLat * sinLon;

          dummy.position.set(x, y, z);
          dummy.lookAt(0, 0, 0);
          dummy.updateMatrix();
          mesh.setMatrixAt(idx, dummy.matrix);

          uvOffset.setXY(idx, biome * tileUSpan, variant * tileVSpan);
          uvScale.setXY(idx, tileUSpan, tileVSpan);
          idx++;
        }
      }
      mesh.instanceMatrix.needsUpdate = true;
      uvOffset.needsUpdate = true;
      uvScale.needsUpdate = true;

      earth.add(mesh);
      currentMesh = mesh;

      // Inner fill sphere so glancing-angle gaps don't show stars.
      const fill = new THREE.Mesh(
        new THREE.SphereGeometry(RADIUS - voxelSize * 0.5, 64, 48),
        new THREE.MeshBasicMaterial({ color: 0x0a1e3a })
      );
      earth.add(fill);
      currentFill = fill;

      setStatus(`Built ${total.toLocaleString()} voxels`);
    }

    // ---------- UI wiring ----------
    const statusEl = document.getElementById('status');
    const loadingEl = document.getElementById('loading');
    function setStatus(s) { statusEl.textContent = s; }

    const ui = {
      file: document.getElementById('file'),
      url: document.getElementById('url'),
      applyUrl: document.getElementById('applyUrl'),
      res: document.getElementById('res'),
      pop: document.getElementById('pop'),
      popVal: document.getElementById('popVal'),
      spin: document.getElementById('spin'),
    };

    function currentRes() {
      const [lat, lon] = ui.res.value.split(',').map(Number);
      return { lat, lon };
    }

    function rebuild() {
      if (!sourceImageData) return;
      const { lat, lon } = currentRes();
      const pop = parseFloat(ui.pop.value);
      buildVoxelEarth(sourceImageData, lat, lon, pop);
    }

    ui.file.addEventListener('change', async (e) => {
      const f = e.target.files && e.target.files[0];
      if (!f) return;
      try {
        sourceImageData = await loadFromFile(f);
        rebuild();
      } catch (err) {
        setStatus('Failed to read file.');
        console.error(err);
      }
    });

    ui.applyUrl.addEventListener('click', async () => {
      const u = ui.url.value.trim();
      if (!u) return;
      try {
        sourceImageData = await loadFromURL(u);
        rebuild();
      } catch (err) {
        setStatus('Failed (CORS or invalid URL).');
        console.error(err);
      }
    });

    ui.res.addEventListener('change', rebuild);
    ui.pop.addEventListener('input', () => {
      ui.popVal.textContent = parseFloat(ui.pop.value).toFixed(2);
      rebuild();
    });

    let spinRate = 0.0008;
    ui.spin.addEventListener('input', () => {
      spinRate = 0.0008 * parseFloat(ui.spin.value);
    });

    // ---------- bootstrap ----------
    (async () => {
      try {
        sourceImageData = await loadFromURL(DEFAULT_EARTH_URL);
        rebuild();
      } catch (err) {
        setStatus('Default image failed to load.');
        console.error(err);
      } finally {
        loadingEl.classList.add('hidden');
      }
    })();

    addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    function animate() {
      requestAnimationFrame(animate);
      earth.rotation.y += spinRate;
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>
</body>
</html>
